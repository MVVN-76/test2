<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>欢迎</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        form { display: inline-block; margin-top: 20px; }
        button { padding: 10px 20px; background-color: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #da190b; }
    </style>
</head>
<body>
    <h2>欢迎, <span th:text="${username}"></span>！</h2>
    <p>您已成功登录。</p>
    <form th:action="@{/logout}" method="post">
        <button type="submit">登出</button>
    </form>
</body>
</html>
